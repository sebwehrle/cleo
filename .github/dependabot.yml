# Dependabot configuration for automated dependency updates.
# Conservative settings: weekly updates, limited PRs, no major version bumps.
#
# Note: After merging Dependabot PRs, regenerate requirements-lock.txt:
#   pip-compile pyproject.toml -o requirements-lock.txt

version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    ignore:
      # Skip major version bumps - review manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
