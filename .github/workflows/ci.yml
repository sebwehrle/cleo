name: CI

env:
  RUFF_VERSION: "0.15.2"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff==${RUFF_VERSION}"

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Check linting
        run: python -m ruff check .

  complexity:
    name: Complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install complexity tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install radon vulture

      - name: Check cyclomatic complexity (fail on grade D)
        run: |
          echo "Checking for blocking complexity functions (grade D or worse, CC > 20)..."
          GRADE_D_OR_WORSE=$(radon cc cleo --min D -s 2>/dev/null || true)
          if [[ -n "$GRADE_D_OR_WORSE" ]]; then
            echo "FAIL: Functions with complexity grade D or worse found (CC > 20):"
            echo "$GRADE_D_OR_WORSE"
            echo ""
            echo "These functions must be refactored to reduce complexity."
            exit 1
          fi
          echo "OK: No grade D or worse functions found"

      - name: Check cyclomatic complexity (report grade E)
        run: |
          echo "Checking for critical complexity functions (grade E, CC > 30)..."
          GRADE_E=$(radon cc cleo --min E -s 2>/dev/null || true)
          if [[ -n "$GRADE_E" ]]; then
            echo "Critical functions with complexity grade E found (CC > 30):"
            echo "$GRADE_E"
            echo ""
            echo "These are a subset of the grade D-or-worse failure threshold."
          else
            echo "OK: No grade E functions found"
          fi

      - name: Check maintainability index
        run: |
          echo "Checking maintainability index..."
          LOW_MI=$(radon mi cleo -s 2>/dev/null | grep -E "^cleo.*- [CF]" || true)
          if [[ -n "$LOW_MI" ]]; then
            echo "WARNING: Modules with low maintainability (grade C or below):"
            echo "$LOW_MI"
          else
            echo "OK: All modules have acceptable maintainability"
          fi

      - name: Check for dead code
        run: |
          echo "Checking for dead code..."
          DEAD_CODE=$(vulture cleo --min-confidence 90 2>/dev/null || true)
          if [[ -n "$DEAD_CODE" ]]; then
            echo "WARNING: Potential dead code detected (90%+ confidence):"
            echo "$DEAD_CODE"
          else
            echo "OK: No high-confidence dead code detected"
          fi

      - name: Print complexity summary
        run: |
          echo ""
          echo "=== Complexity Summary ==="
          radon cc cleo -a 2>/dev/null | tail -1
          echo ""
          echo "Grade distribution:"
          radon cc cleo -a 2>/dev/null | grep -E "^[A-F] " || true

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "mkdocs>=1.6" "mkdocstrings[python]>=0.26"

      - name: Build docs (strict)
        run: python -m mkdocs build --strict

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin libproj-dev proj-bin

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -q tests/unit

      - name: Run integration tests
        run: python -m pytest -q tests/integration

      - name: Run smoke tests
        run: python -m pytest -q tests/smoke

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin libproj-dev proj-bin

      - name: Install package and audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python -m pip install -e .

      - name: Run pip-audit
        run: |
          echo "Checking for known vulnerabilities in dependencies..."
          pip-audit --desc || echo "WARNING: Some vulnerabilities found (non-blocking for now)"

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: python -m pip install "detect-secrets==1.5.0"

      - name: Scan for secrets
        run: |
          echo "Scanning for potential secrets..."
          tools/secret_scan.sh --all --json-out .secrets-scan-results.json

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build

      - name: Verify import and version
        run: |
          python -m pip install dist/*.whl
          python -c "from cleo import __version__; print(f'cleo version: {__version__}')"
